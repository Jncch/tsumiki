patterns:
  - id: nda_scope_overbroad
    name: 秘密情報の範囲過大
    description: |
      検出すべき:
      - 「秘密情報とは、開示者が受領者に開示した一切の情報をいう」「口頭・書面・電磁的方法その他媒体を問わず全ての情報を含む」など、秘密情報の範囲が無限定に広い表現。
      - 「秘密である旨の表示の有無を問わない」「秘密指定の有無にかかわらず全て秘密情報とする」など、秘密管理の外形を欠く包括指定。
      - 既知情報、公知情報、受領後に自己の責めによらず公知となった情報、正当権限ある第三者から適法に取得した情報、独自開発情報等の典型的除外が定義条項に存在しない又は極端に不足している場合。
      紛らわしい:
      - 「書面又は電磁的記録により秘密である旨明示された情報」「口頭開示後30日以内に書面で特定された情報」のように、秘密指定手続が明確な規定。
      - 「受領時に既に保有していた情報」「公知の情報」「第三者から適法に取得した情報」を除外する一般的な除外規定。
      - 技術情報・営業情報等を列挙していても、除外事由と秘密指定方法が併記されている場合。
      対象条項:
      - 「秘密情報」「機密情報」の定義、秘密情報の範囲、秘密指定方法、除外情報を定める definition 主題の条項を判定対象とする。
      - secrecy 一般条項ではなく、何が秘密情報に当たるかを定める条文かを確認して判定する。
    applicable_topics: [definition]
    excerpt_examples:
      - "本契約において「秘密情報」とは、開示当事者から受領当事者に対して開示された一切の情報をいう。"
      - "秘密情報とは、秘密である旨の表示の有無を問わず、協議又は取引に関連して相手方が知り得たすべての事項を含むものとする。"
      - "開示者が受領者に提供し、又は受領者が閲覧した資料、口頭説明、データ、知見その他一切の情報は、除外なく秘密情報とみなす。"
    severity: high
    references:
      - 経済産業省 営業秘密管理指針
      - 不正競争防止法 2条6項

  - id: nda_duration_unbounded
    name: 秘密保持期間の無期限・過長
    description: |
      検出すべき:
      - 「本契約終了後も永続的に」「期間の定めなく」「永久に」秘密保持義務を負うなど、期間上限がない表現。
      - 「営業秘密性の有無を問わず恒久的に保持する」「情報の価値が失われた後も無期限に継続する」など、情報の性質に照らして不合理に長い継続義務。
      - 契約期間の定めはあっても、秘密保持義務だけが別条で無期限・永久とされる設計。
      紛らわしい:
      - 「契約期間中及び終了後3年間」「開示日から5年間」など、明示的で通常実務上みられる合理的期間。
      - 「営業秘密に該当する情報についてはその性質上合理的な期間継続する」といった、情報類型に応じた限定付きの規定。
      - 契約自体は自動更新でも、秘密保持義務の終了時点又は存続期間が別途明記されている場合。
      対象条項:
      - duration, survival, secrecy の主題で、秘密保持義務の継続期間、契約終了後の効力、存続年数を定める条項を判定対象とする。
      - 単なる契約期間条項でも、秘密保持義務の存続年限に言及している場合に限って対象とする。
    applicable_topics: [duration, survival, secrecy]
    excerpt_examples:
      - "受領者は、本契約終了後も期間の定めなく秘密情報を保持しなければならない。"
      - "受領者は、開示された情報について、いかなる場合であっても永久に第三者へ漏えいしてはならない。"
      - "秘密保持義務は契約終了後も当然に存続し、その終期は定めないものとする。"
    severity: high
    references:
      - 経済産業省 秘密情報の保護ハンドブック

  - id: nda_purpose_undefined
    name: 利用目的の不明確
    description: |
      検出すべき:
      - 「本件のため」「関連する目的のため」「両当事者間で予定する事項のため」など、利用目的が抽象的で具体的取引・検討対象が読み取れない表現。
      - 目的条項自体が存在せず、秘密情報の利用範囲が受領者の一般的事業活動にまで広がり得る構成。
      - 「業務上必要な範囲で利用できる」など、誰のどの業務か不明で目的外利用禁止の基準にならない表現。
      紛らわしい:
      - 「〇〇製品の共同開発可否の検討」「業務委託契約締結に向けた見積・技術評価」のように、案件・取引・検討内容が特定されている規定。
      - 「別紙記載のプロジェクトに関する協議及び検証の目的に限る」など、外部文書参照でも特定可能な規定。
      - secrecy 条項で「前条の目的の範囲内でのみ利用する」としており、前条の目的が十分具体的な場合。
      対象条項:
      - purpose 主題の目的条項、及び secrecy 主題の目的外利用禁止条項のうち、秘密情報の利用目的・合意目的の具体性を判定すべき条項を対象とする。
      - 単なる契約の背景説明や前文のみで、利用範囲の規律を置いていない記述は補助事情にとどめる。
    applicable_topics: [purpose, secrecy]
    excerpt_examples:
      - "受領者は本件に関連する目的のために秘密情報を利用できる。"
      - "当事者は、相互に開示された情報を、両者が必要と認める範囲で使用することができる。"
      - "秘密情報の利用は、当事者間で予定される取引に付随する目的に限る。"
    severity: medium
    references:
      - JIPDEC 秘密情報の取扱いに関するガイドブック

  - id: nda_disclosure_exception_missing
    name: 法令・規制当局等への開示例外不在
    description: |
      検出すべき:
      - 「いかなる第三者にも開示してはならない」「裁判所その他公的機関を含め一切開示不可」など、法令遵守上必要な開示余地がない絶対的禁止。
      - 第三者開示禁止はあるが、裁判所・行政機関・監督官庁・証券取引所等からの適法な命令又は要請への対応規定がない。
      - 弁護士、公認会計士、税理士、親会社の法務・監査部門等、守秘義務を負う専門家・関係者への必要最小限の開示例外が全くない。
      紛らわしい:
      - 「法令、裁判所の命令又は行政機関の要請により開示する場合」のように、法令開示例外が明示されている規定。
      - 「弁護士、公認会計士その他法令上守秘義務を負う専門家に対する必要な開示」を認める規定。
      - 公知情報や正当取得情報の除外は definition 側の論点であり、それだけで本パターンの該当としない。
      対象条項:
      - secrecy, disclosure_exception の主題で、第三者開示禁止、例外開示、法令開示、専門家開示を定める条項を判定対象とする。
      - 定義条項の除外情報の話ではなく、開示行為の許容例外が設けられているかを確認する。
    applicable_topics: [secrecy, disclosure_exception]
    excerpt_examples:
      - "受領者は、いかなる第三者に対しても秘密情報を開示してはならない。"
      - "受領者は、理由のいかんを問わず、官公庁その他外部者に対し秘密情報を一切提示してはならない。"
      - "秘密情報は受領者内部でのみ保持するものとし、弁護士その他の専門家を含む第三者への提供は認められない。"
    severity: high
    references:
      - 民事訴訟法 220条

  - id: nda_remedy_imbalanced
    name: 損害賠償・違約金の不均衡
    description: |
      検出すべき:
      - 受領者のみについて「違約金1億円」「損害の発生を要せず直ちに支払う」など、実損や契約規模に照らして過大な違約金を定める表現。
      - 受領者の損害賠償責任は無制限・包括的である一方、開示者については「一切責任を負わない」「故意重過失でも免責」など著しく偏った責任配分。
      - 双務的な情報開示を予定する NDA であるのに、一方当事者の違反にのみ制裁・差止め・賠償を課し、他方には実質的な責任がない構成。
      紛らわしい:
      - 「相手方に生じた通常かつ直接の損害を賠償する」など、双方に概ね同等の責任を課す規定。
      - 契約金額や受領対価等に連動した合理的な賠償上限、又は故意・重過失を上限除外とする一般的な責任制限。
      - 差止請求の明記自体は一般的であり、それのみで不均衡とはしない。
      対象条項:
      - liability, confirmation の主題で、損害賠償、違約金、責任制限、免責、差止め、表明保証違反時の救済を定める条項を判定対象とする。
      - 契約全体が片務か双務かを踏まえ、責任設計の均衡を確認する。
    applicable_topics: [liability, confirmation]
    excerpt_examples:
      - "受領者が本契約に違反した場合、違約金として金1億円を直ちに支払うものとする。"
      - "受領者は、秘密情報の漏えいにより開示者に生じた一切の損害、逸失利益及び間接損害を無制限に賠償する。開示者は何らの責任を負わない。"
      - "本契約に関し、受領者のみが損害賠償責任を負うものとし、開示者は秘密情報の正確性、有用性その他一切について責任を負わない。"
    severity: high
    references:
      - 民法 420条 421条

  - id: nda_jurisdiction_one_sided
    name: 準拠法・管轄の欠落または一方的指定
    description: |
      検出すべき:
      - 準拠法又は合意管轄が条文上存在せず、紛争解決ルールが不明確な構成。
      - 「開示者の本店所在地を管轄する裁判所を専属管轄とする」「開示者の指定する裁判所」といった、相手方にとって著しく不利又は不確定な一方指定。
      - 国際取引で「別途協議する」だけで準拠法を定めない、又は外国法準拠・遠隔地管轄を一方的に押し付ける規定。
      紛らわしい:
      - 「東京地方裁判所を第一審の専属的合意管轄裁判所とする」など、実務上一般的で明確な合意管轄。
      - 「被告の本店所在地を管轄する裁判所」「東京地裁又は大阪地裁」など、一定の中立性・予見可能性がある規定。
      - 仲裁合意が別途明確に置かれている場合は、単に裁判管轄条項がないことのみで本パターンに直結しない。
      対象条項:
      - jurisdiction 主題で、準拠法、専属的合意管轄、裁判管轄、仲裁、紛争解決方法を定める条項を判定対象とする。
      - 単なる協議条項や誠実協議義務ではなく、最終的な紛争解決フォーラムの定めの有無を確認する。
    applicable_topics: [jurisdiction]
    excerpt_examples:
      - "本契約に関する紛争は、開示者の指定する裁判所を専属管轄とする。"
      - "本契約に関して訴訟の必要が生じた場合、甲の本店所在地を管轄する裁判所のみを第一審の専属管轄裁判所とする。"
      - "本契約の準拠法および管轄については必要に応じて別途協議して定める。"
    severity: medium
    references:
      - 民事訴訟法 11条

  - id: nda_return_destroy_missing
    name: 返還・廃棄義務の不在または確認手段なし
    description: |
      検出すべき:
      - 契約終了時、協議不成立時、又は開示者の請求時に、秘密情報及びその複製物を返還・消去・廃棄する義務が定められていない。
      - 「適切に管理する」とのみ規定し、終了時処理に関する返還・廃棄の具体的措置がない。
      - 廃棄義務はあるが、廃棄完了通知、証明書提出、電磁的データの削除確認など、開示者が履行確認できる手段が全くない。
      紛らわしい:
      - 「開示者の請求があったときは直ちに返還又は廃棄する」「複製物及び記録媒体を含む」といった具体的規定。
      - 「廃棄完了後、書面又は電子メールで証明する」「削除証明書を提出する」など、確認方法が定められている規定。
      - 法令保存義務やバックアップの例外を限定的に認めつつ、利用禁止と保存管理を定めている場合。
      対象条項:
      - return_destroy 主題で、契約終了時の資料返還、データ削除、廃棄、複製物処理、廃棄証明を定める条項を判定対象とする。
      - secrecy 一般条項だけでは足りず、終了時の後処理ルールの有無を確認する。
    applicable_topics: [return_destroy]
    excerpt_examples:
      - "受領者は秘密情報を適切に管理するものとする。"
      - "本契約終了後の資料の返還、消去その他の処理については、受領者の判断に委ねるものとする。"
      - "受領者は秘密情報を廃棄することができる。なお、その実施の有無及び方法について開示者への通知は要しない。"
    severity: medium
    references:
      - 経済産業省 秘密情報の保護ハンドブック

  - id: nda_derivative_undefined
    name: 派生情報・成果物の取扱い未定義
    description: |
      検出すべき:
      - 秘密情報を基に作成した分析資料、評価レポート、メモ、加工データ、サンプル、試作品等が秘密情報に含まれるか不明で、派生資料の扱いが空白。
      - 成果物・派生資料の知的財産権の帰属、使用許諾、返還・廃棄義務が定められておらず、受領者作成物の扱いが争点化し得る構成。
      - 「秘密情報を利用して得られた知見」や統計・集計結果の利用可否について規律がなく、再利用可能性が不明確。
      紛らわしい:
      - 「秘密情報を基に作成した複製物、要約、分析結果その他派生資料も秘密情報に含む」とする規定。
      - 「成果物の知的財産権は甲に帰属する」「受領者の既存ノウハウは受領者に留保する」など、帰属整理が明示されている規定。
      - 単なる NDA でも、成果物が想定されない場面で「複製物・要約物」の取扱いが定義条項や返還条項で十分カバーされている場合。
      対象条項:
      - definition, intellectual_property, deliverable の主題で、派生資料、複製物、分析結果、成果物、知的財産権の帰属・利用・返還を定める条項を判定対象とする。
      - 成果物が生じる可能性のある共同検討・PoC・評価案件では特に重点的に確認する。
    applicable_topics: [definition, intellectual_property, deliverable]
    excerpt_examples:
      - "（派生情報・成果物に関する条項なし）"
      - "受領者は秘密情報を用いて検討資料を作成することができる。"
      - "本契約に基づき作成された分析結果、要約資料及び試作品の権利帰属並びに返還方法については、別段の定めを置かない。"
    severity: medium
    references:
      - 経済産業省 営業秘密管理指針

  - id: nda_survival_missing
    name: 存続条項の欠落
    description: |
      検出すべき:
      - 契約終了、解除、期間満了後に、どの条項が存続するか全く定められていない。
      - 秘密保持義務の終了後の効力、損害賠償請求、返還・廃棄、管轄、準拠法等の存続有無が読み取れず、終了時点で義務の帰趨が不明な構成。
      - 「本契約は終了する」とのみあり、終了後の義務の継続について別条もない場合。
      紛らわしい:
      - 「第○条、第○条は契約終了後も有効に存続する」「秘密保持義務は終了後3年間存続する」など、存続条項が明示されている規定。
      - 各個別条項で「終了後も適用する」と定めており、包括的存続条項がなくても存続関係が明確な場合。
      - 契約期間の定めが短くても、返還・廃棄、損害賠償、管轄等の終了後効が別途整理されている場合。
      対象条項:
      - duration, survival の主題で、有効期間、終了、解除、契約終了後の効力、存続条項を定める条項を判定対象とする。
      - 目的条項や秘密保持義務本体だけを見て欠落判定せず、終了後効を定める条項群の有無を確認する。
    applicable_topics: [duration, survival]
    excerpt_examples:
      - "本契約は、契約期間の満了をもって終了する。"
      - "当事者は、30日前の通知により本契約を解除することができる。"
      - "前各条に定める権利義務は、本契約の終了と同時に消滅するものとする。"
    severity: low
    references:
      - 経済産業省 秘密情報の保護ハンドブック