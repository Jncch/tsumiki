patterns:
- id: nda_scope_overbroad
  name: 秘密情報の範囲過大
  description: '紛らわしい: 厳格な秘密指定手続（書面/電磁的形式での指定、口頭開示後 30 日以内の書面通知等）と除外規定（既知/公知/正当取得）が定義条項に明示されている場合は該当しない。

    対象条項: 「秘密情報」「定義」を主題とする条項のみが判定対象。

    '
  applicable_topics:
  - definition
  excerpt_examples:
  - 本契約において「秘密情報」とは、開示当事者から受領当事者に対して開示された一切の情報をいう。
  severity: high
  references:
  - 経済産業省 営業秘密管理指針
  - 不正競争防止法 2条6項
- id: nda_duration_unbounded
  name: 秘密保持期間の無期限・過長
  description: '紛らわしい: 「3 年間」「5 年間」「契約終了後 2 年間」等の明示的・合理的な期間定めは該当しない。

    対象条項: 「有効期間」「秘密保持義務」「存続」を主題とする条項が判定対象。

    '
  applicable_topics:
  - duration
  - survival
  - secrecy
  excerpt_examples:
  - 受領者は、本契約終了後も期間の定めなく秘密情報を保持しなければならない。
  severity: high
  references:
  - 経済産業省 秘密情報の保護ハンドブック
- id: nda_purpose_undefined
  name: 利用目的の不明確
  description: '紛らわしい: 「〇〇プロジェクトのための事前検討」「特定の業務委託に関する協議」等、具体的事業・取引名が明示されていれば該当しない。

    対象条項: 「目的」「秘密保持義務」（目的外利用禁止を含む条項）が判定対象。

    '
  applicable_topics:
  - purpose
  - secrecy
  excerpt_examples:
  - 受領者は本件に関連する目的のために秘密情報を利用できる。
  severity: medium
  references:
  - JIPDEC 秘密情報の取扱いに関するガイドブック
- id: nda_disclosure_exception_missing
  name: 法令・規制当局等への開示例外不在
  description: '紛らわしい: 「法令により開示を要求された場合」「監督官庁の要請による場合」「専門家への開示」等の例外規定が明示されていれば該当しない。

    対象条項: 「秘密保持義務」「第三者開示の禁止」を主題とする条項のみが判定対象。

    '
  applicable_topics:
  - secrecy
  - disclosure_exception
  excerpt_examples:
  - 受領者は、いかなる第三者に対しても秘密情報を開示してはならない。
  severity: high
  references:
  - 民事訴訟法 220条
- id: nda_remedy_imbalanced
  name: 損害賠償・違約金の不均衡
  description: '紛らわしい: 双方が同等の責任を負う規定、合理的な賠償上限がある規定は該当しない。

    対象条項: 「損害賠償」「違約金」「差止め」等の責任条項が判定対象。

    '
  applicable_topics:
  - liability
  - confirmation
  excerpt_examples:
  - 受領者が本契約に違反した場合、違約金として金1億円を直ちに支払うものとする。
  severity: high
  references:
  - 民法 420条 421条
- id: nda_jurisdiction_one_sided
  name: 準拠法・管轄の欠落または一方的指定
  description: '紛らわしい: 中立的な合意管轄（東京地方裁判所等）、双方の本店所在地のどちらかを選択可能な規定は該当しない。

    対象条項: 「準拠法」「管轄」「紛争の解決」を主題とする条項のみが判定対象。

    '
  applicable_topics:
  - jurisdiction
  excerpt_examples:
  - 本契約に関する紛争は、開示者の指定する裁判所を専属管轄とする。
  severity: medium
  references:
  - 民事訴訟法 11条
- id: nda_return_destroy_missing
  name: 返還・廃棄義務の不在または確認手段なし
  description: '紛らわしい: 「返還又は廃棄」「廃棄証明書を発行」等の具体的規定がある場合は該当しない。返還・廃棄を主題としない条項では判定対象外。

    対象条項: 「秘密情報の返還」「廃棄」「契約終了時の処理」を主題とする条項が判定対象。

    '
  applicable_topics:
  - return_destroy
  excerpt_examples:
  - 受領者は秘密情報を適切に管理するものとする。
  severity: medium
  references:
  - 経済産業省 秘密情報の保護ハンドブック
- id: nda_derivative_undefined
  name: 派生情報・成果物の取扱い未定義
  description: '紛らわしい: 「派生情報も秘密情報に含む」「成果物の帰属は開示者に属する」等の明示があれば該当しない。

    対象条項: 「定義」「知的財産権」「成果物」を主題とする条項が判定対象。

    '
  applicable_topics:
  - definition
  - intellectual_property
  - deliverable
  excerpt_examples:
  - （派生情報・成果物に関する条項なし）
  severity: medium
  references:
  - 経済産業省 営業秘密管理指針
- id: nda_survival_missing
  name: 存続条項の欠落
  description: '紛らわしい: 「本契約終了後も第〇条の義務は存続する」「秘密保持義務は契約終了後 N 年間継続する」等の明示があれば該当しない。

    対象条項: 「有効期間」「終了」「解除」「存続」を主題とする条項のみが判定対象。「目的」「定義」「秘密保持義務」本体等の条項では判定対象外。

    '
  applicable_topics:
  - duration
  - survival
  excerpt_examples:
  - 本契約は、契約期間の満了をもって終了する。
  severity: low
  references:
  - 経済産業省 秘密情報の保護ハンドブック
