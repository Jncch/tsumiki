# ISO/IEC 27001:2022 監査チェック用 不備パターン辞書
#
# Phase 6 で導入. Phase 5a で確定した NDA の Knowledge schema を流用し、ISO27001 統制不備の
# 検出（T1）と是正案生成（T2）の両タスクを対象にする.
#
# 出典の主な参照:
#   - ISO/IEC 27001:2022 Annex A (情報セキュリティ管理策)
#   - IPA「中小企業の情報セキュリティ対策ガイドライン」
#   - JIPDEC ISMS 認証関連ガイダンス
#   - 各種公開規程テンプレート (大学・自治体等)
#
# 業務データ・特定企業の規程は含まない. 公開ガイドラインからの抽象化のみ. (CLAUDE.md §7)
#
# v0.1.0 初版 (2026-06-19): Phase 6a で 9 不備パターンを確定. description は
#   「対象条項」「検出すべき」「紛らわしい」の 3 セクション構成. applicable_topics で
#   統制領域を機械照合できる形にする.

version: "0.1.0"
contract_type: iso27001
last_updated: "2026-06-19"
maintainer: tsumiki

# 統制領域の語彙. パターンの判定対象を絞るためのコントロールド・ボキャブラリ.
topics:
  - id: access
    name: アクセス制御
  - id: logging
    name: ログ取得・監視
  - id: backup
    name: バックアップ・復旧
  - id: incident
    name: インシデント対応
  - id: supplier
    name: 供給者・委託先管理
  - id: classification
    name: 情報の分類
  - id: disposal
    name: 安全な廃棄
  - id: change
    name: 変更管理
  - id: other
    name: その他

patterns:
  - id: iso_access_least_privilege_missing
    name: 最小権限の原則の不備
    description: |
      検出すべき: アクセス制御の規定にもかかわらず「業務に必要な範囲」「最小限の権限」「Need-to-Know」等、最小権限の原則を示す制約が明記されていない、または全員に同一権限を付与している記述がある。
      紛らわしい: 「業務上必要な最小限の権限のみ付与する」「職務分離に基づき権限を分離する」等、最小権限を明示している記述は該当しない。
      対象条項: 「アクセス制御」「権限付与」「ID 管理」を主題とする規程・手順書のみが判定対象。
    applicable_topics: [access]
    excerpt_examples:
      - "従業員は業務システムにアクセスできるものとする。"
      - "全ての職員は管理者権限を付与する。"
    severity: high
    references:
      - ISO/IEC 27001:2022 Annex A 5.15 アクセス制御
      - IPA 中小企業の情報セキュリティ対策ガイドライン

  - id: iso_access_review_missing
    name: アクセス権の定期見直し手順の欠落
    description: |
      検出すべき: アクセス権付与の手順はあるが、付与後の定期見直し（例: 半年毎・人事異動時のレビュー）に関する手順・責任者・頻度が定められていない。
      紛らわしい: 「四半期毎にアクセス権を見直す」「人事異動時に権限を再評価する」等、見直しの頻度・契機・責任者が明示されていれば該当しない。
      対象条項: 「アクセス権」「ID 管理」「権限管理」を主題とする規程・手順書のみが判定対象。
    applicable_topics: [access]
    excerpt_examples:
      - "アクセス権は申請に基づき付与する。"
      - "退職時の権限剥奪については別途定める。"
    severity: high
    references:
      - ISO/IEC 27001:2022 Annex A 5.18 アクセス権

  - id: iso_log_retention_undefined
    name: ログの保持期間と改ざん防止策の不明確
    description: |
      検出すべき: ログ取得の規定はあるが、ログの保持期間が「適切に」「必要な期間」等の抽象表現で具体的期間が定められていない、または改ざん防止・アクセス制限措置が記述されていない。
      紛らわしい: 「1 年間以上保持する」「3 年間保持し読み取り専用領域に保管する」等、保持期間と改ざん防止策が具体的に書かれていれば該当しない。
      対象条項: 「ログ」「監査証跡」「監視」を主題とする規程・手順書のみが判定対象。
    applicable_topics: [logging]
    excerpt_examples:
      - "システムログは適切な期間保持する。"
      - "監査ログは必要な期間保管し、必要に応じてレビューする。"
    severity: medium
    references:
      - ISO/IEC 27001:2022 Annex A 8.15 ログ取得

  - id: iso_backup_test_missing
    name: バックアップ復元テストの未規定
    description: |
      検出すべき: バックアップの取得手順は定義されているが、定期的な復元テストの実施手順・頻度・成功判定基準が規定されていない。
      紛らわしい: 「年 1 回以上の復元テストを実施する」「四半期毎にリストア試験を行い結果を記録する」等、復元テストの頻度・記録方法が明示されていれば該当しない。
      対象条項: 「バックアップ」「事業継続」「復旧」を主題とする規程・手順書のみが判定対象。
    applicable_topics: [backup]
    excerpt_examples:
      - "重要データは日次でバックアップする。"
      - "システム停止時はバックアップから復旧する。"
    severity: high
    references:
      - ISO/IEC 27001:2022 Annex A 8.13 情報のバックアップ

  - id: iso_incident_response_plan_missing
    name: インシデント対応手順の未整備
    description: |
      検出すべき: 情報セキュリティインシデント発生時の連絡先・エスカレーション経路・初動対応者の責任範囲が定められていない、または「速やかに対応する」のような抽象表現に留まっている。
      紛らわしい: 「インシデント受付窓口は CSIRT に通知し、X 時間以内に初動を行う」のように連絡先・時間目標・責任者が明示されていれば該当しない。
      対象条項: 「インシデント対応」「事故対応」「セキュリティ事故」を主題とする規程・手順書のみが判定対象。
    applicable_topics: [incident]
    excerpt_examples:
      - "セキュリティインシデント発生時は速やかに対応する。"
      - "重大な事故は経営層に報告するものとする。"
    severity: high
    references:
      - ISO/IEC 27001:2022 Annex A 5.24 情報セキュリティインシデント管理の計画と準備

  - id: iso_supplier_risk_assessment_missing
    name: 供給者・委託先のリスク評価不在
    description: |
      検出すべき: 供給者・委託先選定時のセキュリティリスク評価・契約上のセキュリティ要件の確認・定期的な遵守状況確認の手順が定められていない。
      紛らわしい: 「委託先選定時にセキュリティチェックリストで評価し、年 1 回遵守状況を確認する」等、評価手順と継続確認の頻度が明示されていれば該当しない。
      対象条項: 「供給者管理」「委託先管理」「外部委託」を主題とする規程・手順書のみが判定対象。
    applicable_topics: [supplier]
    excerpt_examples:
      - "委託先選定は調達部門で行う。"
      - "業務委託先には機密保持を遵守させる。"
    severity: high
    references:
      - ISO/IEC 27001:2022 Annex A 5.19 情報セキュリティの供給者関係

  - id: iso_data_classification_missing
    name: 情報資産の機密区分の未定義
    description: |
      検出すべき: 情報資産の機密区分（極秘・秘・社外秘・公開等）の定義、各区分の取扱基準（保管・送信・複製・廃棄）が定められていない、または定義はあるが運用適用方法が記述されていない。
      紛らわしい: 「機密区分は『機密・社外秘・公開』の 3 区分とし、機密は施錠保管・暗号化送信を必須とする」等、区分と取扱基準が具体的であれば該当しない。
      対象条項: 「情報資産分類」「情報の取扱い」「機密区分」を主題とする規程・手順書のみが判定対象。
    applicable_topics: [classification]
    excerpt_examples:
      - "重要な情報は適切に管理する。"
      - "機密情報の取扱いは関連法令を遵守する。"
    severity: medium
    references:
      - ISO/IEC 27001:2022 Annex A 5.12 情報の分類

  - id: iso_secure_disposal_missing
    name: 安全な廃棄手順の不在
    description: |
      検出すべき: 記憶媒体・印刷物・電子データの廃棄手順が「適切に廃棄する」等の抽象表現に留まり、廃棄方法（物理破壊・データ完全消去・第三者証明）が具体的に定められていない。
      紛らわしい: 「ハードディスクは物理破壊し廃棄証明書を取得する」「データは DoD 規格で完全消去する」等、廃棄方法と証跡の取得が明示されていれば該当しない。
      対象条項: 「廃棄」「情報の削除」「媒体管理」を主題とする規程・手順書のみが判定対象。
    applicable_topics: [disposal]
    excerpt_examples:
      - "使用済み媒体は適切に廃棄する。"
      - "退職時に貸与品を返却するものとする。"
    severity: medium
    references:
      - ISO/IEC 27001:2022 Annex A 8.10 情報の削除

  - id: iso_change_management_missing
    name: 変更管理の承認・記録手順の欠落
    description: |
      検出すべき: システム変更・構成変更時の承認プロセス、変更内容の記録、影響評価、ロールバック手順のいずれかが明確に定められていない。
      紛らわしい: 「変更は変更管理委員会の承認を得て実施し、変更票を記録する」「リリース前にロールバック手順を確認する」等、承認・記録・影響評価が具体化されていれば該当しない。
      対象条項: 「変更管理」「リリース管理」「構成管理」を主題とする規程・手順書のみが判定対象。
    applicable_topics: [change]
    excerpt_examples:
      - "システム変更は担当者の判断で実施する。"
      - "緊急時の変更は事後報告とする。"
    severity: medium
    references:
      - ISO/IEC 27001:2022 Annex A 8.32 変更管理
