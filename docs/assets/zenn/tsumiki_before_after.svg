<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" font-family="-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif">
  <defs>
    <marker id="big_arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="14" markerHeight="14" orient="auto">
      <polygon points="0,0 10,5 0,10" fill="#333"/>
    </marker>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="2.5" flood-color="#000" flood-opacity="0.18"/>
    </filter>
    <radialGradient id="bgLeft" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFEEEE"/>
      <stop offset="100%" stop-color="#F8DDDD"/>
    </radialGradient>
    <radialGradient id="bgRight" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E8F8E8"/>
      <stop offset="100%" stop-color="#D0EBD0"/>
    </radialGradient>
  </defs>

  <!-- 背景 -->
  <rect width="1000" height="600" fill="#FFFFFF"/>

  <!-- 左パネル背景 -->
  <rect x="20" y="60" width="430" height="510" rx="14" fill="url(#bgLeft)" stroke="#C97070" stroke-width="1.5"/>
  <!-- 右パネル背景 -->
  <rect x="550" y="60" width="430" height="510" rx="14" fill="url(#bgRight)" stroke="#5BA010" stroke-width="1.5"/>

  <!-- 左タイトル -->
  <text x="235" y="92" font-size="18" font-weight="700" text-anchor="middle" fill="#7A3030">これまで</text>
  <text x="235" y="112" font-size="11" text-anchor="middle" fill="#A0686B">タスクごとにバラバラ</text>

  <!-- 右タイトル -->
  <text x="765" y="92" font-size="18" font-weight="700" text-anchor="middle" fill="#3B7008">tsumiki で</text>
  <text x="765" y="112" font-size="11" text-anchor="middle" fill="#5BA010">部品を組み立てて何にでも</text>

  <!-- ================== 左: バラバラに散らばったパズルピース ================== -->

  <!-- ピース 1 NDA (左上, 回転) -->
  <g transform="translate(80, 165) rotate(-15)" filter="url(#softShadow)">
    <path d="M0 0 h60 v18 a8 8 0 0 1 0 16 v18 h-18 a8 8 0 0 1 -16 0 h-26 z"
      fill="#9CABBC" stroke="#5D6A7B" stroke-width="1.5"/>
    <text x="22" y="32" font-size="10" font-weight="700" text-anchor="middle" fill="white">NDA</text>
  </g>

  <!-- ピース 2 ISO (右上, 回転) -->
  <g transform="translate(290, 150) rotate(20)" filter="url(#softShadow)">
    <path d="M0 0 h60 v18 a8 8 0 0 1 0 16 v18 h-60 v-18 a8 8 0 0 1 0 -16 z"
      fill="#A6A0BC" stroke="#67617D" stroke-width="1.5"/>
    <text x="30" y="32" font-size="10" font-weight="700" text-anchor="middle" fill="white">ISO</text>
  </g>

  <!-- ピース 3 広報 (左中, 回転) -->
  <g transform="translate(70, 290) rotate(8)" filter="url(#softShadow)">
    <path d="M0 0 h60 v52 h-26 a8 8 0 0 1 -16 0 h-18 z"
      fill="#BC9CA0" stroke="#7D5D61" stroke-width="1.5"/>
    <text x="30" y="32" font-size="10" font-weight="700" text-anchor="middle" fill="white">広報</text>
  </g>

  <!-- ピース 4 議事録 (中央, 回転) -->
  <g transform="translate(215, 285) rotate(-25)" filter="url(#softShadow)">
    <path d="M0 0 h60 v18 a8 8 0 0 0 0 16 v18 h-60 z"
      fill="#A9BC9C" stroke="#6A7D5D" stroke-width="1.5"/>
    <text x="30" y="32" font-size="10" font-weight="700" text-anchor="middle" fill="white">議事録</text>
  </g>

  <!-- ピース 5 仕様 (左下, 回転) -->
  <g transform="translate(90, 410) rotate(-12)" filter="url(#softShadow)">
    <path d="M0 0 v52 h60 v-34 a8 8 0 0 0 -16 0 v-18 z"
      fill="#BCB59C" stroke="#7D765D" stroke-width="1.5"/>
    <text x="30" y="32" font-size="10" font-weight="700" text-anchor="middle" fill="white">仕様書</text>
  </g>

  <!-- ピース 6 キャンペーン (右下, 回転) -->
  <g transform="translate(285, 405) rotate(18)" filter="url(#softShadow)">
    <path d="M0 0 v34 a8 8 0 0 0 16 0 v18 h44 v-52 z"
      fill="#9CBCB5" stroke="#5D7D76" stroke-width="1.5"/>
    <text x="30" y="32" font-size="10" font-weight="700" text-anchor="middle" fill="white">販促案</text>
  </g>

  <!-- バラバラ感を強調するバツ印 (中央付近) -->
  <g transform="translate(200, 480)">
    <circle cx="0" cy="0" r="28" fill="#FFFFFF" stroke="#C44444" stroke-width="3"/>
    <line x1="-14" y1="-14" x2="14" y2="14" stroke="#C44444" stroke-width="4" stroke-linecap="round"/>
    <line x1="14" y1="-14" x2="-14" y2="14" stroke="#C44444" stroke-width="4" stroke-linecap="round"/>
  </g>
  <text x="234" y="540" font-size="12" text-anchor="middle" fill="#7A3030" font-weight="700">繋がらない / 流用できない</text>

  <!-- ================== 中央: tsumiki 矢印 ================== -->

  <g transform="translate(465, 290)">
    <rect x="-7" y="-32" width="70" height="64" rx="14" fill="#FFF4D6" stroke="#CC9900" stroke-width="2.5"/>
    <text x="28" y="-8" font-size="14" font-weight="700" text-anchor="middle" fill="#7A5500">tsumiki</text>
    <!-- 小さな積み木のアイコン -->
    <rect x="14" y="2" width="28" height="6" fill="#4A90E2" rx="1"/>
    <rect x="14" y="9" width="28" height="6" fill="#F5A623" rx="1"/>
    <rect x="14" y="16" width="28" height="6" fill="#9013FE" rx="1"/>
    <rect x="14" y="23" width="28" height="6" fill="#7ED321" rx="1"/>

    <line x1="0" y1="55" x2="60" y2="55" stroke="#333" stroke-width="3.5" marker-end="url(#big_arrow)"/>
  </g>

  <!-- ================== 右: 中央に積み木の塔 + 周囲に 6 タスク ================== -->

  <!-- 中央の積み木の塔 (4 ブロック) -->
  <g transform="translate(700, 240)" filter="url(#softShadow)">
    <!-- ブロック 4 (Provider) 緑 -->
    <rect x="-50" y="100" width="160" height="38" fill="#7ED321" stroke="#5BA010" stroke-width="2" rx="3"/>
    <text x="30" y="124" font-size="12" font-weight="700" fill="white" text-anchor="middle">Provider</text>

    <!-- ブロック 3 (Policy) 紫 -->
    <rect x="-44" y="65" width="148" height="38" fill="#9013FE" stroke="#6010C0" stroke-width="2" rx="3"/>
    <text x="30" y="89" font-size="12" font-weight="700" fill="white" text-anchor="middle">Policy</text>

    <!-- ブロック 2 (Evaluator) オレンジ -->
    <rect x="-38" y="30" width="136" height="38" fill="#F5A623" stroke="#C0820C" stroke-width="2" rx="3"/>
    <text x="30" y="54" font-size="12" font-weight="700" fill="white" text-anchor="middle">Evaluator</text>

    <!-- ブロック 1 (Knowledge) 青 -->
    <rect x="-32" y="-5" width="124" height="38" fill="#4A90E2" stroke="#2868B0" stroke-width="2" rx="3"/>
    <text x="30" y="19" font-size="12" font-weight="700" fill="white" text-anchor="middle">Knowledge</text>
  </g>

  <!-- 周囲の 6 タスク (整然と配置) -->
  <!-- NDA レビュー (左上) -->
  <g transform="translate(595, 170)" filter="url(#softShadow)">
    <circle cx="0" cy="0" r="28" fill="#FFFFFF" stroke="#4A90E2" stroke-width="2.5"/>
    <text x="0" y="-2" font-size="9" font-weight="700" text-anchor="middle" fill="#222">NDA</text>
    <text x="0" y="9" font-size="8" text-anchor="middle" fill="#555">レビュー</text>
  </g>
  <line x1="623" y1="170" x2="668" y2="240" stroke="#888" stroke-width="1.5"/>

  <!-- ISO 監査 (右上) -->
  <g transform="translate(890, 170)" filter="url(#softShadow)">
    <circle cx="0" cy="0" r="28" fill="#FFFFFF" stroke="#4A90E2" stroke-width="2.5"/>
    <text x="0" y="-2" font-size="9" font-weight="700" text-anchor="middle" fill="#222">ISO</text>
    <text x="0" y="9" font-size="8" text-anchor="middle" fill="#555">監査</text>
  </g>
  <line x1="862" y1="170" x2="810" y2="240" stroke="#888" stroke-width="1.5"/>

  <!-- 広報 原稿 (左中) -->
  <g transform="translate(575, 320)" filter="url(#softShadow)">
    <circle cx="0" cy="0" r="28" fill="#FFFFFF" stroke="#F5A623" stroke-width="2.5"/>
    <text x="0" y="-2" font-size="9" font-weight="700" text-anchor="middle" fill="#222">広報</text>
    <text x="0" y="9" font-size="8" text-anchor="middle" fill="#555">原稿</text>
  </g>
  <line x1="603" y1="320" x2="668" y2="320" stroke="#888" stroke-width="1.5"/>

  <!-- 議事録要約 (右中) -->
  <g transform="translate(910, 320)" filter="url(#softShadow)">
    <circle cx="0" cy="0" r="28" fill="#FFFFFF" stroke="#F5A623" stroke-width="2.5"/>
    <text x="0" y="-2" font-size="9" font-weight="700" text-anchor="middle" fill="#222">議事録</text>
    <text x="0" y="9" font-size="8" text-anchor="middle" fill="#555">要約</text>
  </g>
  <line x1="882" y1="320" x2="810" y2="320" stroke="#888" stroke-width="1.5"/>

  <!-- 仕様書 → テスト (左下) -->
  <g transform="translate(595, 470)" filter="url(#softShadow)">
    <circle cx="0" cy="0" r="28" fill="#FFFFFF" stroke="#9013FE" stroke-width="2.5"/>
    <text x="0" y="-2" font-size="9" font-weight="700" text-anchor="middle" fill="#222">仕様</text>
    <text x="0" y="9" font-size="8" text-anchor="middle" fill="#555">テスト</text>
  </g>
  <line x1="623" y1="470" x2="668" y2="400" stroke="#888" stroke-width="1.5"/>

  <!-- キャンペーン案 (右下) -->
  <g transform="translate(890, 470)" filter="url(#softShadow)">
    <circle cx="0" cy="0" r="28" fill="#FFFFFF" stroke="#9013FE" stroke-width="2.5"/>
    <text x="0" y="-2" font-size="9" font-weight="700" text-anchor="middle" fill="#222">販促</text>
    <text x="0" y="9" font-size="8" text-anchor="middle" fill="#555">案</text>
  </g>
  <line x1="862" y1="470" x2="810" y2="400" stroke="#888" stroke-width="1.5"/>

  <!-- 中央チェックマーク -->
  <g transform="translate(720, 540)">
    <circle cx="0" cy="0" r="22" fill="#FFFFFF" stroke="#5BA010" stroke-width="3"/>
    <path d="M-10 0 L-3 8 L11 -8" fill="none" stroke="#5BA010" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="765" y="546" font-size="12" font-weight="700" fill="#3B7008">何にでも展開できる</text>
</svg>
