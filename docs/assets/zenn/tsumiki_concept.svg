<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto">
      <polygon points="0,0 10,5 0,10" fill="#333"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="2" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="#FFFFFF"/>

  <!-- タイトル -->
  <text x="400" y="36" font-size="22" font-weight="700" text-anchor="middle" fill="#222">tsumiki = 再利用可能な部品で組み立てるエージェント</text>
  <text x="400" y="60" font-size="13" text-anchor="middle" fill="#777">knowledge / evaluator / policy / provider を組み合わせて、タスク固有のエージェントを 1 つ作る</text>

  <!-- 左: 部品箱 -->
  <g transform="translate(40, 90)">
    <rect x="0" y="0" width="280" height="340" rx="14" fill="#FFF8E7" stroke="#D4A949" stroke-width="2"/>
    <text x="140" y="32" font-size="15" font-weight="700" text-anchor="middle" fill="#8A6310">[ 再利用可能な部品箱 ]</text>
    <text x="140" y="50" font-size="11" text-anchor="middle" fill="#A07020">tsumiki package</text>

    <!-- Knowledge (青) -->
    <g transform="translate(30, 70)" filter="url(#shadow)">
      <rect x="0" y="0" width="220" height="58" fill="#4A90E2" stroke="#2868B0" stroke-width="2" rx="6"/>
      <text x="110" y="25" font-size="14" font-weight="700" fill="white" text-anchor="middle">Knowledge</text>
      <text x="110" y="46" font-size="10.5" fill="white" text-anchor="middle">NDA / ISO27001 / marketing / ...</text>
    </g>

    <!-- Evaluator (オレンジ) -->
    <g transform="translate(30, 142)" filter="url(#shadow)">
      <rect x="0" y="0" width="220" height="58" fill="#F5A623" stroke="#C0820C" stroke-width="2" rx="6"/>
      <text x="110" y="25" font-size="14" font-weight="700" fill="white" text-anchor="middle">Evaluator</text>
      <text x="110" y="46" font-size="10.5" fill="white" text-anchor="middle">lookup / 対話 (Phase 9) / generator</text>
    </g>

    <!-- Policy (紫) -->
    <g transform="translate(30, 214)" filter="url(#shadow)">
      <rect x="0" y="0" width="220" height="58" fill="#9013FE" stroke="#6010C0" stroke-width="2" rx="6"/>
      <text x="110" y="25" font-size="14" font-weight="700" fill="white" text-anchor="middle">Policy</text>
      <text x="110" y="46" font-size="10.5" fill="white" text-anchor="middle">Phase 2 baseline / AgentSquare 4 module</text>
    </g>

    <!-- Provider (緑) -->
    <g transform="translate(30, 286)" filter="url(#shadow)">
      <rect x="0" y="0" width="220" height="40" fill="#7ED321" stroke="#5BA010" stroke-width="2" rx="6"/>
      <text x="110" y="18" font-size="14" font-weight="700" fill="white" text-anchor="middle">Provider</text>
      <text x="110" y="33" font-size="10" fill="white" text-anchor="middle">ollama / OpenAI / Azure / Anthropic / Gemini</text>
    </g>
  </g>

  <!-- 中央: 組み立て矢印 -->
  <g transform="translate(335, 245)">
    <text x="40" y="-16" font-size="13" font-weight="700" text-anchor="middle" fill="#333">組み立て</text>
    <line x1="0" y1="0" x2="80" y2="0" stroke="#333" stroke-width="3" marker-end="url(#arrow)"/>
    <text x="40" y="22" font-size="10" text-anchor="middle" fill="#666">domain × task_class</text>
    <text x="40" y="35" font-size="10" text-anchor="middle" fill="#666">× output_kind × input_modality</text>
  </g>

  <!-- 右: 組み立て品 (タスクごと Agent) -->
  <g transform="translate(465, 90)">
    <rect x="0" y="0" width="295" height="340" rx="14" fill="#F0F8F0" stroke="#5BA010" stroke-width="2"/>
    <text x="148" y="32" font-size="15" font-weight="700" text-anchor="middle" fill="#3B7008">[ タスクごとのエージェント ]</text>
    <text x="148" y="50" font-size="11" text-anchor="middle" fill="#5BA010">同じ部品から組み合わせ違いで生成</text>

    <!-- Agent 1: NDA レビュー (閉じた) -->
    <g transform="translate(20, 65)" filter="url(#shadow)">
      <rect x="0" y="0" width="255" height="70" fill="#FFFFFF" stroke="#888" stroke-width="1.5" rx="6"/>
      <text x="127" y="20" font-size="13" font-weight="700" fill="#222" text-anchor="middle">NDA レビュー Agent</text>
      <rect x="22" y="32" width="50" height="22" fill="#4A90E2" rx="3"/>
      <rect x="77" y="32" width="50" height="22" fill="#F5A623" rx="3"/>
      <rect x="132" y="32" width="50" height="22" fill="#9013FE" rx="3"/>
      <rect x="187" y="32" width="50" height="22" fill="#7ED321" rx="3"/>
      <text x="127" y="63" font-size="10" fill="#555" text-anchor="middle">閉じた / paired_diff +0.261</text>
    </g>

    <!-- Agent 2: 広報原稿 (開放) -->
    <g transform="translate(20, 145)" filter="url(#shadow)">
      <rect x="0" y="0" width="255" height="70" fill="#FFFFFF" stroke="#888" stroke-width="1.5" rx="6"/>
      <text x="127" y="20" font-size="13" font-weight="700" fill="#222" text-anchor="middle">広報原稿 Agent</text>
      <rect x="22" y="32" width="50" height="22" fill="#4A90E2" rx="3"/>
      <rect x="77" y="32" width="50" height="22" fill="#F5A623" rx="3"/>
      <rect x="132" y="32" width="50" height="22" fill="#9013FE" rx="3"/>
      <rect x="187" y="32" width="50" height="22" fill="#7ED321" rx="3"/>
      <text x="127" y="63" font-size="10" fill="#555" text-anchor="middle">開放 / score_diff +0.250</text>
    </g>

    <!-- Agent 3: あなたのユースケース (点線, 拡張性) -->
    <g transform="translate(20, 225)" filter="url(#shadow)">
      <rect x="0" y="0" width="255" height="70" fill="#FFFCEB" stroke="#CC9900" stroke-width="1.8" stroke-dasharray="6 3" rx="6"/>
      <text x="127" y="20" font-size="13" font-weight="700" fill="#222" text-anchor="middle">あなたのユースケース</text>
      <rect x="22" y="32" width="50" height="22" fill="#4A90E2" rx="3"/>
      <rect x="77" y="32" width="50" height="22" fill="#F5A623" rx="3"/>
      <rect x="132" y="32" width="50" height="22" fill="#9013FE" rx="3"/>
      <rect x="187" y="32" width="50" height="22" fill="#7ED321" rx="3"/>
      <text x="127" y="63" font-size="10" fill="#555" text-anchor="middle">新規 knowledge 1 つ追加で完了</text>
    </g>
  </g>

  <!-- フッタ -->
  <text x="400" y="478" font-size="11" text-anchor="middle" fill="#888">「同じ部品箱を共有しながら、タスクごとに違う組み立て品を作る」これが tsumiki の設計思想</text>
</svg>
